<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>狂野排版机</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
      background: #faf9f7;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 主体两栏 ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── 左栏 ── */
    .pane-left {
      width: 50%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #e8e3dc;
      background: #f3f0eb;
    }

    .pane-left .toolbar {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid #e8e3dc;
      gap: 8px;
      flex-shrink: 0;
    }

    /* ── 右栏 ── */
    .pane-right {
      width: 50%;
      display: flex;
      flex-direction: column;
      background: #faf9f7;
    }

    .pane-right .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 10px 14px;
      border-bottom: 1px solid #e8e3dc;
      gap: 8px;
      flex-shrink: 0;
    }

    /* ── Tab 导航 ── */
    .tab-bar {
      display: flex;
      gap: 4px;
      padding: 8px 14px;
      border-bottom: 1px solid #e8e3dc;
      flex-shrink: 0;
    }

    .tab-btn {
      padding: 5px 12px;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      background: transparent;
      color: #8a8278;
      transition: background 0.15s, color 0.15s;
    }

    .tab-btn:hover { background: #eae6e0; color: #5a5550; }
    .tab-btn.active { background: #e8e3dc; color: #1a1a1a; border-color: #c8c3bc; }

    /* ── 按钮 ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      transition: opacity 0.15s, background 0.15s;
      white-space: nowrap;
      line-height: 1;
    }

    .btn:active { opacity: 0.75; }

    .btn-ghost {
      background: transparent;
      border-color: #d8d3cc;
      color: #5a5550;
    }

    .btn-ghost:hover { background: #eae6e0; }

    .btn-primary {
      background: #d97757;
      color: #fff;
      border-color: #d97757;
    }

    .btn-primary:hover { background: #c96a48; border-color: #c96a48; }

    /* 隐藏的文件输入 */
    #file-input { display: none; }

    /* ── textarea（左栏编辑器）── */
    #md-input, #css-input {
      flex: 1;
      width: 100%;
      padding: 20px;
      border: none;
      outline: none;
      resize: none;
      font-family: "Menlo", "Monaco", "Cascadia Code", "Courier New", monospace;
      font-size: 13.5px;
      line-height: 1.7;
      color: #2a2a2a;
      background: transparent;
      overflow-y: auto;
    }

    #css-input { display: none; }

    /* ── 预览区 ── */
    #preview {
      flex: 1;
      padding: 24px 32px;
      overflow-y: auto;
      line-height: 1.8;
    }

    /* ── 滚动条 ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d0cbc4; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #b8b3ac; }
  </style>
</head>
<body>

<div class="layout">

  <!-- 左栏：Tab 编辑区 -->
  <div class="pane-left">
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-md" onclick="switchTab('md')">Markdown</button>
      <button class="tab-btn" id="tab-css" onclick="switchTab('css')">样式 CSS</button>
    </div>
    <input type="file" id="file-input" accept=".md,.markdown,.txt" style="display:none">
    <textarea id="md-input" placeholder="在此粘贴或编辑 Markdown 内容…&#10;&#10;支持 GFM 语法：标题、表格、代码块、引用等。"></textarea>
    <textarea id="css-input" placeholder="在此编辑 CSS 样式，实时预览…"></textarea>
  </div>

  <!-- 右栏：预览 + 操作栏 -->
  <div class="pane-right">
    <div class="toolbar">
      <button class="btn btn-primary" id="copy-btn" onclick="copyHtml()">
        一键复制微信排版
      </button>
    </div>
    <div id="preview"></div>
  </div>

</div>

<!-- CDN -->
<script src="https://unpkg.com/marked@4.3.0/marked.min.js"></script>
<!-- 业务逻辑 -->
<script src="js/clipboard.js"></script>
<script src="js/app.js"></script>

</body>
</html>
