<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>狂野排版机</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
      background: #faf9f7;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 主体两栏 ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── 左栏 ── */
    .pane-left {
      width: 50%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #e8e3dc;
      background: #f3f0eb;
    }

    .pane-left .toolbar {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid #e8e3dc;
      gap: 8px;
      flex-shrink: 0;
    }

    /* ── 右栏 ── */
    .pane-right {
      width: 50%;
      display: flex;
      flex-direction: column;
      background: #faf9f7;
    }

    .pane-right .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 10px 14px;
      border-bottom: 1px solid #e8e3dc;
      gap: 8px;
      flex-shrink: 0;
    }

    /* ── 按钮 ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      transition: opacity 0.15s, background 0.15s;
      white-space: nowrap;
      line-height: 1;
    }

    .btn:active { opacity: 0.75; }

    .btn-ghost {
      background: transparent;
      border-color: #d8d3cc;
      color: #5a5550;
    }

    .btn-ghost:hover { background: #eae6e0; }

    .btn-primary {
      background: #d97757;
      color: #fff;
      border-color: #d97757;
    }

    .btn-primary:hover { background: #c96a48; border-color: #c96a48; }

    .btn-css {
      background: transparent;
      border-color: #d8d3cc;
      color: #8a8278;
      font-size: 12px;
      padding: 5px 10px;
    }

    .btn-css:hover { background: #eae6e0; color: #5a5550; }
    .btn-css.active { background: #e8e3dc; color: #1a1a1a; border-color: #c8c3bc; }

    /* 隐藏的文件输入 */
    #file-input { display: none; }

    /* ── textarea（左栏编辑器）── */
    #md-input, #css-input {
      flex: 1;
      width: 100%;
      padding: 20px;
      border: none;
      outline: none;
      resize: none;
      font-family: "Menlo", "Monaco", "Cascadia Code", "Courier New", monospace;
      font-size: 13.5px;
      line-height: 1.7;
      color: #2a2a2a;
      background: transparent;
      overflow-y: auto;
    }

    #css-input { display: none; }

    /* ── 预览区 ── */
    #preview {
      flex: 1;
      padding: 24px 32px;
      overflow-y: auto;
      line-height: 1.8;
    }

    /* CSS 编辑模式下，右栏显示 textarea */
    #css-preview-input {
      display: none;
      flex: 1;
      width: 100%;
      padding: 20px;
      border: none;
      outline: none;
      resize: none;
      font-family: "Menlo", "Monaco", "Cascadia Code", "Courier New", monospace;
      font-size: 13.5px;
      line-height: 1.7;
      color: #2a2a2a;
      background: transparent;
      overflow-y: auto;
    }

    /* ── 滚动条 ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d0cbc4; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #b8b3ac; }
  </style>
</head>
<body>

<div class="layout">

  <!-- 左栏：Markdown 编辑器 -->
  <div class="pane-left">
    <div class="toolbar">
      <input type="file" id="file-input" accept=".md,.markdown,.txt">
      <button class="btn btn-ghost" onclick="document.getElementById('file-input').click()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        导入 .md 文件
      </button>
    </div>
    <textarea id="md-input" placeholder="在此粘贴或编辑 Markdown 内容…&#10;&#10;支持 GFM 语法：标题、表格、代码块、引用等。"></textarea>
  </div>

  <!-- 右栏：预览 + 操作栏 -->
  <div class="pane-right">
    <div class="toolbar">
      <button class="btn btn-css" id="css-toggle-btn" onclick="toggleCssMode()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
        </svg>
        样式 CSS
      </button>
      <button class="btn btn-primary" id="copy-btn" onclick="copyHtml()">
        一键复制微信排版
      </button>
    </div>
    <div id="preview"></div>
    <textarea id="css-preview-input" placeholder="在此编辑 CSS 样式，实时预览…"></textarea>
  </div>

</div>

<!-- CDN -->
<script src="https://unpkg.com/marked/marked.min.js"></script>
<script src="https://unpkg.com/juice/client.js"></script>
<!-- 业务逻辑 -->
<script src="js/clipboard.js"></script>
<script src="js/app.js"></script>

</body>
</html>
